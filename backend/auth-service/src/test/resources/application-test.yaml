server:
  port: 0

spring:
  application:
    name: auth-service
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: 4C6F6E675365637265744B6579466F7243616D7075734F53323032364A5754546F6B656E536563726574
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

app:
  super-admin:
    email: superadmin@campusos.test
    password: Test@1234
    full-name: Super Admin
  validate-school: false
  cors:
    allowed-origins: "*"

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
