springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs
      - name: School Service
        url: /api/schools/v3/api-docs
      - name: Academic Service
        url: /api/academics/v3/api-docs
      - name: Calendar Service
        url: /api/calendar/v3/api-docs
      - name: Fee Service
        url: /api/fees/v3/api-docs
      - name: Message Service
        url: /api/messages/v3/api-docs

server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - AuthGatewayFilter
        - id: school-service
          uri: lb://school-service
          predicates:
            - Path=/api/schools/**
          filters:
            - AuthGatewayFilter
        - id: academic-service
          uri: lb://academic-service
          predicates:
            - Path=/api/academics/**
          filters:
            - AuthGatewayFilter
        - id: calendar-service
          uri: lb://calendar-service
          predicates:
            - Path=/api/calendar/**
          filters:
            - AuthGatewayFilter
        - id: fee-service
          uri: lb://fee-service
          predicates:
            - Path=/api/fees/**
          filters:
            - AuthGatewayFilter
        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/api/messages/**
          filters:
            - AuthGatewayFilter

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: your-very-long-and-secure-jwt-secret-key-that-is-at-least-256-bits

gateway:
  public-endpoints:
    - /api/auth/login
    - /api/auth/register/parent
    - /api/auth/forgot-password
    - /api/auth/reset-password