server:
  port: 8888

spring:
  application:
    name: config-server

  profiles:
    active: native

  cloud:
    config:
      server:
        native:
          # Config lives in this module's classpath (src/main/resources/config-repo/<service>.yml),
          # so it is always found regardless of the working directory.
          search-locations: classpath:/config-repo/