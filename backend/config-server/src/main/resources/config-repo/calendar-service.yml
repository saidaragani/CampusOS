server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/calendar_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:prabhas}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cloud:
    openfeign:
      client:
        config:
          # Fail fast on a slow message-service so publishing never stalls.
          message-service:
            connect-timeout: 2000
            read-timeout: 3000

app:
  gateway-url: ${GATEWAY_URL:http://localhost:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
