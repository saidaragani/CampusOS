server:
  port: 8087

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/school_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:prabhas}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  gateway-url: ${GATEWAY_URL:http://localhost:8080}
  storage:
    base-dir: ${FILE_STORAGE_DIR:./uploads}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
